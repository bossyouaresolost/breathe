<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Breathe - Zen Sanctuary</title>
    <style>
        :root {
            --bg: #05070a;
            --orb-inhale: rgba(79, 209, 197, 0.5);
            --orb-hold: rgba(252, 129, 129, 0.5);
            --orb-exhale: rgba(99, 179, 237, 0.5);
            --orb-hold2: rgba(183, 148, 244, 0.5);
            --text: #e2e8f0;
        }

        body {
            margin: 0; overflow: hidden; background: var(--bg);
            color: var(--text); font-family: 'Inter', sans-serif;
            display: flex; justify-content: center; align-items: center; min-height: 100vh;
        }

        #canvas { position: fixed; inset: 0; z-index: 1; pointer-events: none; }

        /* Setup UI */
        .ui-layer {
            position: relative; z-index: 20; text-align: center;
            width: 320px; transition: all 0.6s ease;
            background: rgba(15, 20, 25, 0.9);
            padding: 35px; border-radius: 40px;
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255,255,255,0.05);
        }
        .ui-layer.hidden { opacity: 0; pointer-events: none; transform: scale(0.9); }

        .controls { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin: 25px 0; }
        .input-group label { display: block; font-size: 0.6rem; text-transform: uppercase; margin-bottom: 8px; opacity: 0.5; font-weight: 700; }
        input { width: 100%; background: rgba(0,0,0,0.3); border: 1px solid rgba(255,255,255,0.1); color: white; padding: 12px 0; text-align: center; border-radius: 12px; font-size: 1rem; }

        .presets { margin-bottom: 10px; display: flex; justify-content: center; gap: 8px; }
        .preset-btn { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); color: var(--text); padding: 6px 14px; border-radius: 20px; cursor: pointer; font-size: 0.7rem; transition: 0.3s; }
        .preset-btn:hover { background: white; color: black; }

        .start-btn { width: 100%; padding: 18px; border-radius: 15px; border: none; background: white; color: black; font-weight: 800; cursor: pointer; letter-spacing: 2px; }

        /* Sound Icon - Top Right */
        #mute-btn {
            position: fixed; top: 30px; right: 30px; z-index: 40;
            background: none; border: none; color: white; font-size: 1.5rem;
            cursor: pointer; opacity: 0; pointer-events: none; transition: 0.5s;
        }
        #mute-btn.visible { opacity: 0.6; pointer-events: all; }
        #mute-btn:hover { opacity: 1; }

        /* Hero Orb */
        #orb-container {
            position: fixed; z-index: 10; display: flex; flex-direction: column; 
            align-items: center; justify-content: center; 
            opacity: 0; pointer-events: none;
            transition: opacity 1.5s ease;
        }
        #orb-container.visible { opacity: 1; transform: scale(1); }

        .orb {
            width: 300px; height: 300px; border-radius: 50%;
            background: rgba(255,255,255,0.03);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255,255,255,0.05);
        }

        #phase-label { font-size: 0.9rem; letter-spacing: 0.4rem; font-weight: 300; margin-bottom: 5px; opacity: 0.8; }
        #timer { font-size: 6rem; font-weight: 200; line-height: 1; font-variant-numeric: tabular-nums; }

        /* Bottom HUD - Session Timer & End */
        .hud-bottom {
            position: fixed; bottom: 40px; z-index: 30; text-align: center;
            opacity: 0; pointer-events: none; transition: 0.5s;
        }
        .hud-bottom.visible { opacity: 1; pointer-events: all; }
        #session-timer { font-size: 0.75rem; letter-spacing: 3px; opacity: 0.5; font-weight: 600; margin-bottom: 20px; display: block; }
        .end-btn { background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.1); color: #fc8181; padding: 12px 30px; border-radius: 30px; cursor: pointer; backdrop-filter: blur(5px); font-size: 0.75rem; font-weight: 700; letter-spacing: 1px; }

        /* Summary Overlay */
        #summary {
            position: fixed; inset: 0; background: rgba(5,7,10,0.98); z-index: 100;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            opacity: 0; pointer-events: none; transition: 0.8s; text-align: center; padding: 20px;
        }
        #summary.active { opacity: 1; pointer-events: all; }
        .stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 50px; margin: 30px 0; }
        .stat-val { font-size: 3.5rem; display: block; font-weight: 200; color: #4fd1c5; }
        .stat-label { font-size: 0.7rem; opacity: 0.4; text-transform: uppercase; letter-spacing: 2px; }
        #quote { font-style: italic; opacity: 0.7; max-width: 420px; line-height: 1.6; margin-bottom: 40px; font-weight: 300; font-size: 1.1rem; }
    </style>
</head>
<body>

<canvas id="canvas"></canvas>

<button id="mute-btn">🔊</button>

<div class="ui-layer" id="setup-ui">
    <h2 style="font-weight: 200; letter-spacing: 8px; margin-bottom: 25px;">BREATHE</h2>
    <div class="presets">
        <button class="preset-btn" onclick="setPreset(4,4,4,4)">BOX</button>
        <button class="preset-btn" onclick="setPreset(4,7,8,0)">4-7-8</button>
        <button class="preset-btn" onclick="setPreset(5,0,5,0)">5-5</button>
    </div>
    <div class="controls">
        <div class="input-group"><label>In</label><input type="number" id="in-v" value="4"></div>
        <div class="input-group"><label>Hold</label><input type="number" id="h1-v" value="4"></div>
        <div class="input-group"><label>Out</label><input type="number" id="out-v" value="15"></div>
        <div class="input-group"><label>Hold</label><input type="number" id="h2-v" value="4"></div>
    </div>
    <button class="start-btn" onclick="startSession()">BEGIN</button>
</div>

<div id="orb-container">
    <div class="orb" id="orb">
        <div id="phase-label">READY</div>
        <div id="timer">0</div>
    </div>
</div>

<div class="hud-bottom" id="hud-bottom">
    <span id="session-timer">00:00</span>
    <button class="end-btn" onclick="endSession()">END SESSION</button>
</div>

<div id="summary">
    <h1 style="font-weight: 200; letter-spacing: 6px; margin-bottom: 10px;">PEACE FOUND</h1>
    <p id="quote">"Breath is the bridge..."</p>
    <div class="stat-grid">
        <div><span class="stat-val" id="sum-time">0:00</span><span class="stat-label">Duration</span></div>
        <div><span class="stat-val" id="sum-breaths">0</span><span class="stat-label">Cycles</span></div>
    </div>
    <button class="preset-btn" style="padding: 15px 50px; font-size: 0.9rem;" onclick="location.reload()">RESTART</button>
</div>

<script>
    const orbContainer = document.getElementById('orb-container');
    const orb = document.getElementById('orb');
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const sessionTimeDisplay = document.getElementById('session-timer');
    
    let isRunning = false, breathCount = 0, sessionStart, isMuted = false;
    let audioCtx, windNode, filterNode, binauralL, binauralR;
    let clockInterval;

    const quotes = [
        "Breath is the bridge which connects life to consciousness.",
        "Quiet the mind, and the soul will speak.",
        "Conscious breathing is my anchor.",
        "Inhale the future, exhale the past.",
        "The breath you just took is a gift. Let it be enough."
    ];

    // --- Particle System ---
    let particles = [];
    class Particle {
        constructor() { this.reset(); }
        reset() {
            this.x = Math.random() * canvas.width;
            this.y = Math.random() * canvas.height;
            this.vx = 0; this.vy = 0;
            this.acc = (Math.random() * 0.4) + 0.1;
            this.size = Math.random() * 1.2 + 0.5;
        }
        update(phaseType) {
            const dx = canvas.width / 2 - this.x;
            const dy = canvas.height / 2 - this.y;
            const dist = Math.sqrt(dx*dx + dy*dy) || 1;
            if (phaseType === 'Inhale') {
                this.vx += (dx / dist) * this.acc * 0.25;
                this.vy += (dy / dist) * this.acc * 0.25;
            } else if (phaseType === 'Exhale') {
                this.vx -= (dx / dist) * this.acc * 0.45;
                this.vy -= (dy / dist) * this.acc * 0.45;
            }
            this.x += this.vx; this.y += this.vy;
            this.vx *= 0.93; this.vy *= 0.93;
            if (this.x < 0 || this.x > canvas.width || this.y < 0 || this.y > canvas.height) this.reset();
        }
        draw() {
            ctx.fillStyle = 'rgba(255,255,255,0.7)';
            ctx.beginPath(); ctx.arc(this.x, this.y, this.size, 0, Math.PI*2); ctx.fill();
        }
    }

    function initParticles() {
        canvas.width = window.innerWidth; canvas.height = window.innerHeight;
        particles = Array.from({length: 120}, () => new Particle());
    }

    let currentPhase = 'none';
    function animate() {
        ctx.fillStyle = 'rgba(5, 7, 10, 0.25)';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        particles.forEach(p => { p.update(currentPhase); p.draw(); });
        requestAnimationFrame(animate);
    }

    // --- Audio ---
    function initAudio() {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        const bufferSize = 4096; let lastOut = 0.0;
        windNode = audioCtx.createScriptProcessor(bufferSize, 1, 1);
        windNode.onaudioprocess = (e) => {
            const output = e.outputBuffer.getChannelData(0);
            for (let i = 0; i < bufferSize; i++) {
                const white = Math.random() * 2 - 1;
                output[i] = (lastOut + (0.02 * white)) / 1.02;
                lastOut = output[i];
                output[i] *= 3;
            }
        };
        filterNode = audioCtx.createBiquadFilter(); filterNode.type = 'lowpass';
        const windGain = audioCtx.createGain(); windGain.gain.value = 0.12;
        binauralL = audioCtx.createOscillator(); binauralR = audioCtx.createOscillator();
        const panL = audioCtx.createPanner(); const panR = audioCtx.createPanner();
        panL.setPosition(-1, 0, 0); panR.setPosition(1, 0, 0);
        binauralL.frequency.value = 200; binauralR.frequency.value = 206;
        const binGain = audioCtx.createGain(); binGain.gain.value = 0.04;
        windNode.connect(filterNode); filterNode.connect(windGain); windGain.connect(audioCtx.destination);
        binauralL.connect(panL); panL.connect(binGain); binauralR.connect(panR); panR.connect(binGain); binGain.connect(audioCtx.destination);
        binauralL.start(); binauralR.start();
        if (isMuted) audioCtx.suspend();
    }

    function setPreset(i, h1, o, h2) {
        document.getElementById('in-v').value = i;
        document.getElementById('h1-v').value = h1;
        document.getElementById('out-v').value = o;
        document.getElementById('h2-v').value = h2;
    }

    async function runPhase(name, dur, scale, colorVar, pType) {
        if (!isRunning || dur <= 0) return;
        currentPhase = pType;
        document.getElementById('phase-label').innerText = name;
        orb.style.transition = `transform ${dur}s linear, background 1s ease, box-shadow 1s ease`;
        orb.style.transform = `scale(${scale})`;
        orb.style.background = `var(${colorVar})`;
        orb.style.boxShadow = `0 0 100px var(${colorVar})`;

        if (filterNode) {
            const freq = pType === 'Inhale' ? 1400 : (pType === 'Exhale' ? 350 : 600);
            filterNode.frequency.setTargetAtTime(freq, audioCtx.currentTime, dur);
        }

        for(let i=dur; i>=0; i--) {
            if(!isRunning) break;
            document.getElementById('timer').innerText = i;
            await new Promise(r => setTimeout(r, 1000));
        }
    }

    async function startSession() {
        document.getElementById('setup-ui').classList.add('hidden');
        orbContainer.classList.add('visible');
        document.getElementById('hud-bottom').classList.add('visible');
        document.getElementById('mute-btn').classList.add('visible');
        isRunning = true;
        sessionStart = Date.now();
        initAudio();
        
        // Start Session Clock
        clockInterval = setInterval(() => {
            const diff = Math.floor((Date.now() - sessionStart) / 1000);
            const m = Math.floor(diff/60).toString().padStart(2, '0');
            const s = (diff%60).toString().padStart(2, '0');
            sessionTimeDisplay.innerText = `${m}:${s}`;
        }, 1000);
        
        const iV = parseInt(document.getElementById('in-v').value);
        const h1V = parseInt(document.getElementById('h1-v').value);
        const oV = parseInt(document.getElementById('out-v').value);
        const h2V = parseInt(document.getElementById('h2-v').value);

        while(isRunning) {
            await runPhase('INHALE', iV, 1.3, '--orb-inhale', 'Inhale');
            await runPhase('HOLD', h1V, 1.3, '--orb-hold', 'none');
            await runPhase('EXHALE', oV, 0.7, '--orb-exhale', 'Exhale');
            await runPhase('HOLD', h2V, 0.7, '--orb-hold2', 'none');
            if (isRunning) breathCount++;
        }
    }

    function endSession() {
        isRunning = false;
        clearInterval(clockInterval);
        const totalSecs = Math.floor((Date.now() - sessionStart) / 1000);
        document.getElementById('sum-time').innerText = sessionTimeDisplay.innerText;
        document.getElementById('sum-breaths').innerText = breathCount;
        document.getElementById('quote').innerText = `"${quotes[Math.floor(Math.random()*quotes.length)]}"`;
        document.getElementById('summary').classList.add('active');
        if (audioCtx) audioCtx.close();
    }

    document.getElementById('mute-btn').onclick = () => {
        isMuted = !isMuted;
        document.getElementById('mute-btn').innerText = isMuted ? '🔇' : '🔊';
        isMuted ? audioCtx.suspend() : audioCtx.resume();
    };

    window.onresize = initParticles;
    initParticles();
    animate();
</script>
</body>
</html>
